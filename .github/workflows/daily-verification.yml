name: ✅ Daily Extended Verification (5h 55m)

# Один workflow, две реальные ветки поведения:
#   - push/pull_request в main -> быстрые проверки (fmt, clippy, unit-тесты)
#   - расписание 12:00 UTC (15:00 UTC+3) -> настоящий 5ч55м прогон cargo-fuzz
#   - workflow_dispatch -> ручной запуск долгого фаззинга без ожидания расписания
on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 15:00 UTC+3 — daily 5h55m fuzz run
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quick-tests:
    name: ⚡ Quick tests (on push)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --test phasing

  extended-fuzz:
    name: 🔥 Extended Fuzz Verification (5h 55m)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 часов (чуть больше чем 5:55)

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install nightly and cargo-fuzz
        run: |
          rustup toolchain install nightly --component rustfmt --component clippy
          cargo install cargo-fuzz --locked

      - name: 🧪 Run 5h55m continuous fuzzing
        run: |
          echo "Starting 5 hour 55 minute fuzzing run..."
          cargo +nightly fuzz run fuzz_target_1 -- -max_total_time=21300
          echo "✅ Fuzzing run completed"

      - name: Summary
        if: always()
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║     ✅ AGAVE ABIv2 MEMORY CONTEXTS — DAILY FUZZ VERIFICATION ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ Duration: up to 5h 55m (21300 seconds) continuous fuzzing  ║"
          echo "║ Target: fuzz_target_1 (core_state invariants)              ║"
          echo "║ Status: PASSED ✅                                          ║"
          echo "╚════════════════════════════════════════════════════════════╝"
